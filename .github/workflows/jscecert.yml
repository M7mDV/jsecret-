name: JSecret JS Analysis

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'js_urls.txt'

jobs:
  jsecret-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install jsecret
        run: |
          go install -v github.com/raoufmaklouf/jsecret@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
          jsecret -h | head -5 || echo "jsecret installed"

      - name: Run jsecret
        run: |
          if [ ! -f js_urls.txt ]; then
            echo "❌ js_urls.txt not found!"
            exit 1
          fi
          
          echo "=== Starting jsecret ==="
          echo "Total URLs in js_urls.txt: $(wc -l < js_urls.txt)"
          
          cat js_urls.txt | jsecret > jsecret_results.txt
          
          echo "=== jsecret completed ==="
          RESULTS=$(wc -l < jsecret_results.txt)
          echo "Total findings: $RESULTS"
          
          if [ "$RESULTS" -gt 0 ]; then
            echo "=== Results ==="
            cat jsecret_results.txt
          else
            echo "No findings."
            echo "No secrets or sensitive data found." > jsecret_results.txt
          fi

      - name: Send Results to Discord
        if: success()
        run: |
          URLS=$(wc -l < js_urls.txt)
          RESULTS=$(wc -l < jsecret_results.txt)
          SIZE=$(du -h jsecret_results.txt | cut -f1)
          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')
          
          FILE_SIZE=$(stat -c%s jsecret_results.txt 2>/dev/null || stat -f%z jsecret_results.txt)
          MAX_SIZE=8388608
          
          if [ "$FILE_SIZE" -lt "$MAX_SIZE" ]; then
            echo "Sending file directly ($SIZE)..."
            curl -X POST \
              -H "Content-Type: multipart/form-data" \
              -F "file=@jsecret_results.txt" \
              -F "payload_json={\"username\":\"JSecret Bot\",\"avatar_url\":\"https://avatars.githubusercontent.com/u/0\",\"embeds\":[{\"title\":\"🔐 JSecret JS Analysis\",\"color\":3066993,\"fields\":[{\"name\":\"📥 JS URLs\",\"value\":\"${URLS}\",\"inline\":true},{\"name\":\"🔍 Findings\",\"value\":\"${RESULTS}\",\"inline\":true},{\"name\":\"📦 Size\",\"value\":\"${SIZE}\",\"inline\":true}],\"footer\":{\"text\":\"jsecret • ${NOW}\"}}]}" \
              ${{ secrets.DISCORD_WEBHOOK_URL }}
          else
            echo "File too big, sending summary..."
            RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            curl -X POST \
              -H "Content-Type: application/json" \
              -d "{\"username\":\"JSecret Bot\",\"embeds\":[{\"title\":\"🔐 JSecret JS Analysis\",\"description\":\"⚠️ File too large!\\n\\n📥 JS URLs: **${URLS}**\\n🔍 Findings: **${RESULTS}**\\n📦 Size: **${SIZE}**\\n\\n⬇️ [Download from GitHub Actions](${RUN_URL})\",\"color\":15158332,\"footer\":{\"text\":\"jsecret • ${NOW}\"}}]}" \
              ${{ secrets.DISCORD_WEBHOOK_URL }}
          fi

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jsecret-results
          path: jsecret_results.txt
